name: Build G68 Plus Docker Firmware

on:
  workflow_dispatch:
    inputs:
      threads:
        description: '编译线程数'
        required: false
        default: '8'
        type: string
      make_args:
        description: '额外编译参数 (如 -j1 V=s)'
        required: false
        default: ''
        type: string

env:
  DEVICE: g68-plus-docker
  CONFIG_FILE: g68-plus-docker.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gperf \
            cmake \
            ninja-build \
            libelf-dev \
            libssl-dev \
            zlib1g-dev \
            libgmp-dev \
            libmpc-dev \
            libmpfr-dev \
            gettext \
            autopoint \
            pkg-config \
            zip \
            unzip \
            python3 \
            python3-pip \
            rsync \
            time \
            ccache \
            git \
            subversion
          sudo pip3 install pyelftools

      - name: Cache ccached
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccached-${{ env.DEVICE }}-${{ github.run_id }}
          restore-keys: |
            ccached-${{ env.DEVICE }}-

      - name: Initialize submodules
        run: |
          git submodule update --init --recursive

      - name: Prepare feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "✅ feeds 更新完成"

      - name: Configure build
        run: |
          echo "=== 配置编译 ==="
          
          # 1. 复制用户配置（覆盖 feeds 安装时的默认配置）
          cp defconfig/${{ env.CONFIG_FILE }} .config
          echo "✅ 已复制配置文件"
          
          # 2. 先运行 defconfig 同步 feeds 后的配置
          make defconfig
          echo "✅ 已运行 defconfig（同步 feeds 配置）"
          
          # 3. 再运行 olddefconfig 自动补全依赖（保留用户选择）
          make olddefconfig
          echo "✅ 已运行 olddefconfig（依赖自动补全完成）"
          
          # 4. 验证关键包是否被保留
          echo ""
          echo "=== 验证关键包是否被保留 ==="
          
          # 定义需要验证的关键包
          REQUIRED_PACKAGES=(
            "luci-app-dockerman"
            "luci-app-diskman"
            "luci-theme-argon"
            "luci-app-smartdns"
            "luci-app-upnp"
            "luci-app-zerotier"
            "docker"
            "dockerd"
            "docker-compose"
          )
          
          # 备份关键配置
          mkdir -p build_cache
          > build_cache/required_packages.txt
          
          RESTORED_COUNT=0
          LOST_COUNT=0
          LOST_PACKAGES=""
          
          for pkg in "${REQUIRED_PACKAGES[@]}"; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "✅ $pkg (已保留)"
              echo "$pkg=1" >> build_cache/required_packages.txt
              RESTORED_COUNT=$((RESTORED_COUNT + 1))
            else
              echo "❌ $pkg (丢失! 正在恢复...)"
              # 恢复丢失的包配置
              sed -i "s/# CONFIG_PACKAGE_${pkg} is not set/CONFIG_PACKAGE_${pkg}=y/" .config 2>/dev/null || true
              # 如果之前没有这个配置行，追加到文件末尾
              if ! grep -q "CONFIG_PACKAGE_${pkg}=" .config; then
                echo "CONFIG_PACKAGE_${pkg}=y" >> .config
              fi
              LOST_COUNT=$((LOST_COUNT + 1))
              LOST_PACKAGES="$LOST_PACKAGES $pkg"
            fi
          done
          
          echo ""
          echo "=== 恢复结果 ==="
          echo "保留成功: $RESTORED_COUNT 个"
          echo "恢复完成: $LOST_COUNT 个"
          
          if [ $LOST_COUNT -gt 0 ]; then
            echo "⚠️  以下包被意外禁用后已自动恢复:$LOST_PACKAGES"
            # 重新运行 olddefconfig 确保依赖完整（不要再用 defconfig，会覆盖）
            make olddefconfig
          fi
          
          echo ""
          echo "=== 最终配置确认 ==="
          echo "固件目标: rockchip/armv8"
          echo "设备: nsy_g68-plus"
          grep -c "=y$" .config | xargs echo "已启用配置项总数:"
          
          # 显示关键包状态
          echo ""
          echo "关键插件状态:"
          for pkg in "${REQUIRED_PACKAGES[@]}"; do
            STATUS=$(grep "CONFIG_PACKAGE_${pkg}=y" .config 2>/dev/null || echo "")
            if [ -n "$STATUS" ]; then
              echo "  ✅ $pkg"
            else
              echo "  ❌ $pkg"
            fi
          done

      - name: Build firmware
        run: |
          if [ -n "${{ github.event.inputs.make_args }}" ]; then
            make ${{ github.event.inputs.make_args }} V=s
          else
            make -j${{ github.event.inputs.threads || '8' }} V=s
          fi

      - name: Generate build info
        run: |
          echo "Build completed at: $(date)" > build_info.txt
          echo "Device: ${{ env.DEVICE }}" >> build_info.txt
          echo "Commit: $(git rev-parse HEAD)" >> build_info.txt
          echo "Commit message: $(git log -1 --format='%s')" >> build_info.txt

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.DEVICE }}-firmware
          path: |
            bin/targets/rockchip/armv8/**/*.img.gz
            bin/targets/rockchip/armv8/**/*.tar.gz
            build_info.txt
          retention-days: 14
          compression-level: 9

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE }}-build-logs
          path: |
            logs/
            .config*
          retention-days: 7
