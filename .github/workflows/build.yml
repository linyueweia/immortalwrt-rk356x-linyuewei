name: Build G68 Plus Docker Firmware

on:
  workflow_dispatch:
    inputs:
      threads:
        description: '编译线程数'
        required: false
        default: '8'
        type: string
      make_args:
        description: '额外编译参数 (如 -j1 V=s)'
        required: false
        default: ''
        type: string

env:
  DEVICE: g68-plus-docker
  CONFIG_FILE: g68-plus-docker.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gperf \
            cmake \
            ninja-build \
            libelf-dev \
            libssl-dev \
            zlib1g-dev \
            libgmp-dev \
            libmpc-dev \
            libmpfr-dev \
            gettext \
            autopoint \
            pkg-config \
            zip \
            unzip \
            python3 \
            python3-pip \
            rsync \
            time \
            ccache \
            git \
            subversion
          sudo pip3 install pyelftools

      - name: Cache ccached
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccached-${{ env.DEVICE }}-${{ github.run_id }}
          restore-keys: |
            ccached-${{ env.DEVICE }}-

      - name: Initialize submodules
        run: |
          git submodule update --init --recursive

      - name: Apply device config
        run: |
          cp defconfig/${{ env.CONFIG_FILE }} .config

      - name: Prepare feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Verify required packages
        run: |
          echo "=== 1. 验证关键插件包 ==="
          
          # 定义需要验证的关键包
          REQUIRED_PACKAGES=(
            "luci-app-dockerman"
            "luci-app-diskman"
            "luci-theme-argon"
            "luci-app-smartdns"
            "luci-app-upnp"
            "luci-app-zerotier"
            "docker"
            "dockerd"
            "docker-compose"
          )
          
          MISSING_PACKAGES=""
          MISSING_COUNT=0
          
          for pkg in "${REQUIRED_PACKAGES[@]}"; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "✅ $pkg"
            else
              echo "❌ $pkg (配置中未启用 - 严重问题!)"
              MISSING_PACKAGES="$MISSING_PACKAGES $pkg"
              MISSING_COUNT=$((MISSING_COUNT + 1))
            fi
          done
          
          echo ""
          echo "=== 2. 检查 feeds 中是否有缺失的包 ==="
          
          # 检查关键包在 feeds 中是否存在
          for pkg in "${REQUIRED_PACKAGES[@]}"; do
            if ./scripts/feeds search "$pkg" 2>/dev/null | grep -q "$pkg" || \
               [ -d "package/feeds/luci/$pkg" ] || \
               [ -d "package/feeds/packages/$pkg" ]; then
              echo "✅ $pkg (feeds 中存在)"
            else
              echo "❌ $pkg (feeds 中缺失，可能需要添加自定义源)"
            fi
          done
          
          echo ""
          echo "=== 3. 检查 feeds 初始化状态 ==="
          
          # 检查 feeds 是否正确初始化
          FEEDS_STATUS=0
          
          if [ -d "package/feeds/luci" ]; then
            LUCI_COUNT=$(find package/feeds/luci -maxdepth 1 -type d | wc -l)
            echo "✅ luci feed 已初始化 ($LUCI_COUNT 个包)"
          else
            echo "❌ luci feed 未初始化!"
            FEEDS_STATUS=1
          fi
          
          if [ -d "package/feeds/packages" ]; then
            PKG_COUNT=$(find package/feeds/packages -maxdepth 1 -type d | wc -l)
            echo "✅ packages feed 已初始化 ($PKG_COUNT 个包)"
          else
            echo "❌ packages feed 未初始化!"
            FEEDS_STATUS=1
          fi
          
          if [ -d "package/feeds/routing" ]; then
            echo "✅ routing feed 已初始化"
          fi
          
          if [ -d "package/feeds/telephony" ]; then
            echo "✅ telephony feed 已初始化"
          fi
          
          echo ""
          echo "=== 4. 备份关键配置 ==="
          
          # 备份关键配置项，用于后续验证
          mkdir -p build_cache
          
          for pkg in "${REQUIRED_PACKAGES[@]}"; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "$pkg=1" >> build_cache/required_packages.txt
            fi
          done
          
          echo "✅ 关键配置已备份到 build_cache/required_packages.txt"
          cat build_cache/required_packages.txt
          
          echo ""
          echo "=== 5. 检查固件大小预估 ==="
          echo "配置文件: ${{ env.CONFIG_FILE }}"
          echo "目标设备: ${{ env.DEVICE }}"
          
          # 统计启用的包数量
          ENABLED_PACKAGES=$(grep -c "=y$" .config 2>/dev/null || echo "0")
          echo "已启用配置项: $ENABLED_PACKAGES"
          
          # 检查 Docker 相关包
          DOCKER_COUNT=$(grep -c "CONFIG_PACKAGE_docker" .config 2>/dev/null | grep -v "is not set" || echo "0")
          echo "Docker 相关包: $DOCKER_COUNT 个"
          
          echo ""
          echo "=== 6. 验证结果汇总 ==="
          
          if [ $MISSING_COUNT -gt 0 ] || [ $FEEDS_STATUS -eq 1 ]; then
            echo "⚠️  警告: 发现 $MISSING_COUNT 个缺失包或 feeds 问题"
            echo "请检查上述输出并确保配置文件正确"
            # 不在这里失败，让 make olddefconfig 自动补全依赖
            echo "继续执行编译，make olddefconfig 将尝试自动补全依赖..."
          else
            echo "✅ 所有验证通过!"
          fi

      - name: Configure build
        run: |
          echo "=== 配置编译 ==="
          
          # 1. 复制用户配置
          cp defconfig/${{ env.CONFIG_FILE }} .config
          echo "✅ 已复制配置文件"
          
          # 2. 运行 olddefconfig 自动补全依赖（保留用户选择）
          make olddefconfig
          echo "✅ 已运行 olddefconfig（依赖自动补全完成）"
          
          # 3. 验证关键包是否被保留
          echo ""
          echo "=== 验证关键包是否被保留 ==="
          
          if [ -f build_cache/required_packages.txt ]; then
            RESTORED_COUNT=0
            LOST_COUNT=0
            LOST_PACKAGES=""
            
            while IFS='=' read -r pkg status; do
              if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
                echo "✅ $pkg (已保留)"
                RESTORED_COUNT=$((RESTORED_COUNT + 1))
              else
                echo "❌ $pkg (丢失! 正在恢复...)"
                # 恢复丢失的包配置
                sed -i "s/# CONFIG_PACKAGE_${pkg} is not set/CONFIG_PACKAGE_${pkg}=y/" .config
                LOST_COUNT=$((LOST_COUNT + 1))
                LOST_PACKAGES="$LOST_PACKAGES $pkg"
              fi
            done < build_cache/required_packages.txt
            
            echo ""
            echo "=== 恢复结果 ==="
            echo "保留成功: $RESTORED_COUNT 个"
            echo "恢复完成: $LOST_COUNT 个"
            
            if [ $LOST_COUNT -gt 0 ]; then
              echo "⚠️  以下包被意外禁用后已自动恢复:$LOST_PACKAGES"
              # 重新运行 defconfig 确保依赖完整
              make defconfig 2>/dev/null || true
            fi
          else
            echo "⚠️  未找到备份文件，跳过验证"
          fi
          
          echo ""
          echo "=== 最终配置确认 ==="
          echo "固件目标: rockchip/armv8"
          echo "设备: nsy_g68-plus"
          grep -c "=y$" .config | xargs echo "已启用配置项总数:"
          
          # 显示关键包状态
          echo ""
          echo "关键插件状态:"
          grep -E "CONFIG_PACKAGE_(luci-app-dockerman|luci-app-diskman|luci-theme-argon|docker|dockerd|luci-app-smartdns)" .config 2>/dev/null | grep "=y$" || echo "无"

      - name: Build firmware
        run: |
          if [ -n "${{ github.event.inputs.make_args }}" ]; then
            make ${{ github.event.inputs.make_args }} V=s
          else
            make -j${{ github.event.inputs.threads || '8' }} V=s
          fi

      - name: Generate build info
        run: |
          echo "Build completed at: $(date)" > build_info.txt
          echo "Device: ${{ env.DEVICE }}" >> build_info.txt
          echo "Commit: $(git rev-parse HEAD)" >> build_info.txt
          echo "Commit message: $(git log -1 --format='%s')" >> build_info.txt

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.DEVICE }}-firmware
          path: |
            bin/targets/rockchip/armv8/**/*.img.gz
            bin/targets/rockchip/armv8/**/*.tar.gz
            build_info.txt
          retention-days: 14
          compression-level: 9

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE }}-build-logs
          path: |
            logs/
            .config*
          retention-days: 7
